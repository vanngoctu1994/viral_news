<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viral News Business — Tư vấn AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a28;
    --border: #2a2a3d;
    --accent: #6c63ff;
    --accent2: #ff6b6b;
    --accent3: #43e97b;
    --text: #e8e8f0;
    --text-muted: #7070a0;
    --user-bubble: #1e1e35;
    --bot-bubble: #161625;
    --glow: rgba(108,99,255,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(108,99,255,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(255,107,107,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(67,233,123,0.04) 0%, transparent 60%);
    animation: bgShift 20s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes bgShift {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(2%, 2%) rotate(2deg); }
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 0 20px rgba(108,99,255,0.4);
  }

  .header-text h1 {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-text p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    background: var(--accent3);
    border-radius: 50%;
    margin-left: auto;
    box-shadow: 0 0 8px var(--accent3);
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }

  /* Topics bar */
  .topics-bar {
    position: relative;
    z-index: 10;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.6);
    backdrop-filter: blur(10px);
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .topics-bar::-webkit-scrollbar { display: none; }

  .topic-chip {
    flex-shrink: 0;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    background: transparent;
  }

  .topic-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(108,99,255,0.08);
  }

  /* Chat area */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    position: relative;
    z-index: 5;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-group {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    animation: msgIn 0.3s ease-out;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-group.user {
    flex-direction: row-reverse;
  }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .avatar.bot {
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    box-shadow: 0 0 12px rgba(108,99,255,0.3);
  }

  .avatar.user-av {
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14.5px;
    line-height: 1.65;
    position: relative;
  }

  .msg-group.bot .bubble {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  .msg-group.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(108,99,255,0.3);
    border-top-right-radius: 4px;
    color: #d0d0f0;
  }

  .bubble strong {
    color: #fff;
    font-weight: 600;
  }

  .bubble .highlight {
    color: var(--accent);
    font-weight: 500;
  }

  .bubble .tag {
    display: inline-block;
    padding: 1px 8px;
    background: rgba(108,99,255,0.15);
    border: 1px solid rgba(108,99,255,0.3);
    border-radius: 4px;
    font-size: 12px;
    color: var(--accent);
    margin: 2px 2px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
  }

  .bubble .tag.green {
    background: rgba(67,233,123,0.1);
    border-color: rgba(67,233,123,0.3);
    color: var(--accent3);
  }

  .bubble .tag.red {
    background: rgba(255,107,107,0.1);
    border-color: rgba(255,107,107,0.3);
    color: var(--accent2);
  }

  .bubble ul {
    list-style: none;
    margin-top: 8px;
  }

  .bubble ul li {
    padding: 4px 0;
    padding-left: 16px;
    position: relative;
    color: #c0c0e0;
  }

  .bubble ul li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 12px;
  }

  .bubble .info-box {
    margin-top: 10px;
    padding: 10px 14px;
    background: rgba(108,99,255,0.07);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-size: 13.5px;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 14px 16px;
  }

  .typing span {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: typingDot 1.2s ease-in-out infinite;
    opacity: 0.4;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingDot {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  /* Input area */
  .input-area {
    position: relative;
    z-index: 10;
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 12px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within {
    border-color: rgba(108,99,255,0.5);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.08);
  }

  #input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14.5px;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
  }

  #input::placeholder { color: var(--text-muted); }

  #sendBtn {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 2px 12px rgba(108,99,255,0.4);
  }

  #sendBtn:hover { transform: scale(1.05); box-shadow: 0 4px 16px rgba(108,99,255,0.5); }
  #sendBtn:active { transform: scale(0.97); }
  #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  #sendBtn svg { width: 16px; height: 16px; fill: white; }

  .hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 8px;
  }

  /* Welcome screen */
  #welcome {
    text-align: center;
    padding: 40px 20px;
    max-width: 500px;
    margin: 0 auto;
  }

  #welcome .big-icon {
    font-size: 56px;
    margin-bottom: 16px;
    display: block;
    filter: drop-shadow(0 0 20px rgba(108,99,255,0.5));
  }

  #welcome h2 {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #welcome p {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.7;
    margin-bottom: 28px;
  }

  .quick-questions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    text-align: left;
  }

  .qq-btn {
    padding: 11px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 13.5px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    line-height: 1.4;
  }

  .qq-btn:hover {
    border-color: var(--accent);
    background: rgba(108,99,255,0.08);
    transform: translateX(4px);
  }

  .qq-btn .emoji { margin-right: 8px; }

  @media (max-width: 480px) {
    .bubble { max-width: 90%; font-size: 14px; }
    header { padding: 12px 16px; }
    #chat { padding: 16px; }
    .input-area { padding: 12px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">📰</div>
  <div class="header-text">
    <h1>Viral News Business</h1>
    <p>Hỏi bất cứ điều gì về mô hình kinh doanh này</p>
  </div>
  <div class="status-dot"></div>
</header>

<div class="topics-bar">
  <button class="topic-chip" onclick="quickAsk('Mô hình này hoạt động như thế nào?')">📌 Tổng quan</button>
  <button class="topic-chip" onclick="quickAsk('Cần bao nhiêu vốn để bắt đầu?')">💰 Chi phí</button>
  <button class="topic-chip" onclick="quickAsk('Thu nhập mỗi tháng có thể được bao nhiêu?')">📈 Revenue</button>
  <button class="topic-chip" onclick="quickAsk('Rủi ro lớn nhất của mô hình này là gì?')">⚠️ Rủi ro</button>
  <button class="topic-chip" onclick="quickAsk('Quy trình làm việc hàng ngày như thế nào?')">🔄 Quy trình</button>
  <button class="topic-chip" onclick="quickAsk('Hệ thống tự động hoá được những gì?')">🤖 Automation</button>
  <button class="topic-chip" onclick="quickAsk('Nội dung cần viết như thế nào để viral?')">✍️ Content</button>
  <button class="topic-chip" onclick="quickAsk('Facebook có ban page không nếu dùng automation?')">📱 Facebook</button>
</div>

<div id="chat">
  <div id="welcome">
    <span class="big-icon">🚀</span>
    <h2>Chào mừng bạn!</h2>
    <p>Đây là AI tư vấn về mô hình kinh doanh <strong style="color:#fff">Viral News + Facebook Organic Traffic + Quảng cáo Mgid</strong>. Hỏi bất cứ điều gì bạn muốn biết.</p>
    <div class="quick-questions">
      <button class="qq-btn" onclick="quickAsk('Mô hình này hoạt động như thế nào? Giải thích đơn giản cho tôi')">
        <span class="emoji">💡</span>Mô hình này hoạt động như thế nào? Giải thích đơn giản
      </button>
      <button class="qq-btn" onclick="quickAsk('Cần chuẩn bị những gì để bắt đầu mô hình này?')">
        <span class="emoji">🛠️</span>Cần chuẩn bị những gì để bắt đầu?
      </button>
      <button class="qq-btn" onclick="quickAsk('Một ngày làm việc thông thường sẽ như thế nào?')">
        <span class="emoji">📅</span>Một ngày làm việc thông thường sẽ như thế nào?
      </button>
      <button class="qq-btn" onclick="quickAsk('Mô hình này có phù hợp với người không có nhiều thời gian không?')">
        <span class="emoji">⏰</span>Có phù hợp với người không có nhiều thời gian không?
      </button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="input" placeholder="Hỏi bất cứ điều gì về mô hình này..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="sendBtn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <p class="hint">AI được huấn luyện chuyên sâu về mô hình Viral News · Facebook Organic · Mgid</p>
</div>

<script>
const SYSTEM_PROMPT = `Bạn là chuyên gia tư vấn về mô hình kinh doanh "Viral News + Facebook Organic Traffic + Quảng cáo Native Ads (Mgid)". Bạn đang chia sẻ kiến thức và kinh nghiệm thực tế của mình.

## Về mô hình kinh doanh này:

**Cơ chế hoạt động:**
- Tạo Fanpage Facebook đăng nội dung storytelling hấp dẫn (tiếng Anh, target US market)
- Facebook tự đề xuất bài viết đến người dùng (free organic traffic - không tốn tiền quảng cáo)
- Ảnh thumbnail kết hợp text hook hấp dẫn để giữ người dùng dừng lại
- Comment link dẫn vào website có bài viết đầy đủ hơn
- Website tích hợp quảng cáo Mgid để kiếm tiền từ pageviews

**Điểm khác biệt với traffic arbitrage thông thường:**
- KHÔNG mua traffic - dùng hoàn toàn free organic reach từ Facebook
- Margin cao hơn vì không có chi phí traffic
- Bền vững hơn nếu tạo được content chất lượng

**Nội dung (Content):**
- Dạng storytelling (kể chuyện) - định dạng hiệu quả nhất cho US audience
- Các story type hiệu quả nhất: underdog wins, random kindness, unexpected twist, parent-child moments, veteran stories, animal rescue
- Ảnh thumbnail: AI generate + collage + text overlay (hook text rất quan trọng)
- Cấu trúc: FB post ngắn dừng ở điểm gay cấn → comment link → website có bài đầy đủ

**Hệ thống tự động hoá (9 Agents AI):**
1. Sourcing Agent - tìm story hay từ web/FB pages
2. Content Writer Agent - viết content tự động bằng AI
3. Image Agent - generate ảnh + text overlay tự động
4. QA Agent - kiểm duyệt tự động, chỉ flag bài không đạt
5. Publisher Agent - đăng WordPress + Fanpage tự động
6. Monitor Agent - phát hiện khi bài viral (reach spike)
7. Comment Agent - comment link tự động khi bài viral
8. Analytics Agent - báo cáo revenue
9. Dashboard - giao diện vận hành cho nhân sự

**Tech stack:** Python, Claude API, Ideogram API, WordPress REST API, Facebook Graph API, SQLite, APScheduler

**Chi phí vận hành ước tính:**
- Anthropic API: $50-150/tháng
- Ideogram API (image generation): $30-80/tháng  
- Hosting WordPress: $5-20/tháng
- Domain: ~$1/tháng
- Tổng: khoảng $90-260/tháng

**Revenue:**
- Mgid RPM cho US traffic: $2-8 USD per 1000 pageviews
- Phụ thuộc vào: số lượng bài viral/tháng, pageviews/bài, thời gian trên trang
- Mô hình scale được: càng nhiều bài → càng nhiều cơ hội viral → càng nhiều revenue

**Rủi ro chính:**
- Facebook thay đổi thuật toán đề xuất
- FB ban page nếu phát hiện automation không tự nhiên
- Mgid suspend nếu traffic chất lượng thấp (bounce rate cao)
- Chi phí API vượt revenue nếu không tối ưu

**Yêu cầu để thành công:**
- Content chất lượng cao, đúng format US storytelling
- Ảnh hook đủ hấp dẫn để stop scroll
- Website load nhanh, mobile-friendly
- Đủ volume bài (nhiều bài → tăng cơ hội có bài viral)
- Kiên nhẫn trong 1-3 tháng đầu để xây dựng page authority

## Cách bạn trả lời:
- Trả lời bằng tiếng Việt, thân thiện và dễ hiểu
- Dùng ví dụ cụ thể, thực tế
- Thành thật về rủi ro và thách thức
- Không thổi phồng thu nhập - đưa ra con số thực tế
- Nếu không biết con số cụ thể, nói thẳng là ước tính
- Khuyến khích người hỏi nếu họ nghiêm túc, nhưng không spam
- Trả lời ngắn gọn và đúng trọng tâm, không dài dòng
- Dùng emoji vừa phải để dễ đọc`;

let messages = [];
let isLoading = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function quickAsk(text) {
  document.getElementById('input').value = text;
  send();
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code style="background:rgba(108,99,255,0.15);padding:1px 6px;border-radius:4px;font-size:13px">$1</code>')
    .replace(/^#{1,3}\s+(.+)$/gm, '<strong style="color:#fff;font-size:15px;display:block;margin-top:10px;margin-bottom:4px">$1</strong>')
    .replace(/^[-•]\s+(.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

function addMessage(role, text) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const chat = document.getElementById('chat');
  const group = document.createElement('div');
  group.className = `msg-group ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role === 'bot' ? 'bot' : 'user-av'}`;
  avatar.textContent = role === 'bot' ? '🤖' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = formatText(text);

  group.appendChild(avatar);
  group.appendChild(bubble);
  chat.appendChild(group);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

function showTyping() {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const chat = document.getElementById('chat');
  const group = document.createElement('div');
  group.className = 'msg-group bot';
  group.id = 'typing-indicator';

  const avatar = document.createElement('div');
  avatar.className = 'avatar bot';
  avatar.textContent = '🤖';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

  group.appendChild(avatar);
  group.appendChild(bubble);
  chat.appendChild(group);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function send() {
  const input = document.getElementById('input');
  const btn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  btn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  addMessage('user', text);
  messages.push({ role: 'user', content: text });

  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: messages
      })
    });

    const data = await res.json();
    removeTyping();

    const reply = data.content?.[0]?.text || 'Xin lỗi, có lỗi xảy ra. Vui lòng thử lại.';
    messages.push({ role: 'assistant', content: reply });
    addMessage('bot', reply);

  } catch (err) {
    removeTyping();
    addMessage('bot', '⚠️ Có lỗi kết nối. Vui lòng thử lại sau.');
  }

  isLoading = false;
  btn.disabled = false;
  input.focus();
}
</script>
</body>
</html>
